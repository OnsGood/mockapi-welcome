<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mock API — Welcome</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html {
      -webkit-text-size-adjust: 100%;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Roboto, Helvetica, Arial, sans-serif;
      font-size: 16px;
      font-weight: 400;
      line-height: 1.5;
      color: #060607;
      background: #fff;
    }

    .page {
      max-width: 1150px;
      margin: 0 auto;
      padding: 50px 25px 70px;
      text-align: center;
    }

    .title {
      margin: 0 0 50px;
      font-size: 40px;
      font-weight: 500;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .step {
      margin: 0 0 50px;
    }

    .step:last-child {
      margin-bottom: 0;
    }

    .step-text {
      margin: 0 0 50px;
      font-size: 22px;
      font-weight: 400;
      line-height: 1.5;
    }

    .step-image {
      display: block;
      width: 100%;
      max-width: 100%;
      height: auto;
      margin: 0 auto;
    }

    @media (max-width: 767px) {
      .page {
        max-width: 360px;
        padding: 30px 15px 50px;
      }

      .title {
        margin-bottom: 30px;
        font-size: 34px;
      }

      .step-text {
        margin-bottom: 30px;
        font-size: 18px;
      }

      .step {
        margin-bottom: 30px;
      }
    }
  </style>
  <script defer src="https://cloud.umami.is/script.js" data-website-id="44a17547-ade0-424d-b946-f1e12ec11500"></script>
</head>
<body>
  <main class="page">
    <h1 class="title">Mock API Installed</h1>

    <section class="step">
      <p class="step-text">
        Click the puzzle piece (1) in the top right of your browser.
        Then, click the little pin (2) next to the extension:
      </p>
      <img
        class="step-image"
        src="images/first.png"
        alt="Open the Extensions menu and pin Mock API to the toolbar"
        width="2071"
        height="1486"
      >
    </section>

    <section class="step">
      <p class="step-text">
        Open the extension (3) on any page to start using Mock API:
      </p>
      <img
        class="step-image"
        src="images/second.png"
        alt="Click the Mock API icon in the browser toolbar"
        width="2069"
        height="1486"
      >
    </section>
  </main>
</body>
</html>
